<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WikiLens</title>
    <style>
      body {
        font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
        background: #0a0e1a;
        color: #f8fafc;
        margin: 0;
        padding: 14px;
        width: 300px;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 10px 0;
        color: #60a5fa;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .info {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 12px;
        line-height: 1.45;
        word-break: break-word;
      }
      .info .title {
        color: #f8fafc;
        font-size: 13px;
        margin-bottom: 2px;
      }
      button {
        width: 100%;
        padding: 9px 12px;
        background: #60a5fa;
        color: #0a0e1a;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 150ms;
      }
      button:hover {
        background: #7bb5fb;
      }
      button:disabled {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.3);
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 11px;
        font-family: ui-monospace, monospace;
        color: rgba(255, 255, 255, 0.5);
        min-height: 14px;
      }
      .footer {
        margin-top: 10px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.25);
        text-align: right;
      }
      .footer a {
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
      }
      .footer a:hover {
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <h1>WikiLens</h1>
    <div class="info">
      <div class="title" id="art-title">—</div>
      <div id="art-sub">Open a Wikipedia article.</div>
    </div>
    <button id="compare-btn" disabled>Compare editions</button>
    <div class="status" id="status"></div>
    <div class="footer"><a href="#" id="options-link">Settings</a></div>
    <script src="lib/browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
