<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WikiLens</title>
    <style>
      :root {
        --bg: #fff;
        --bg-subtle: #f8f9fa;
        --border: #c8ccd1;
        --border-muted: #eaecf0;
        --text: #202122;
        --text-subtle: #54595d;
        --text-muted: #72777d;
        --link: #3366cc;
        --link-hover: #2a4b8d;
      }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 16px;
        width: 300px;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 12px 0;
        color: var(--text-subtle);
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .info {
        font-size: 12px;
        color: var(--text-subtle);
        margin-bottom: 14px;
        line-height: 1.5;
        word-break: break-word;
      }
      .info .title {
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 2px;
      }
      button {
        width: 100%;
        padding: 9px 12px;
        background: var(--link);
        color: #fff;
        border: 1px solid var(--link);
        border-radius: 3px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background-color 150ms, border-color 150ms;
      }
      button:hover {
        background: var(--link-hover);
        border-color: var(--link-hover);
      }
      button:disabled {
        background: var(--bg-subtle);
        color: var(--text-muted);
        border-color: var(--border-muted);
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text-muted);
        min-height: 14px;
      }
      .footer {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--border-muted);
        font-size: 11px;
        text-align: right;
      }
      .footer a {
        color: var(--text-subtle);
        text-decoration: none;
      }
      .footer a:hover {
        color: var(--link);
      }
    </style>
  </head>
  <body>
    <h1>WikiLens</h1>
    <div class="info">
      <div class="title" id="art-title">—</div>
      <div id="art-sub">Open a Wikipedia article.</div>
    </div>
    <button id="compare-btn" disabled>Compare editions</button>
    <div class="status" id="status"></div>
    <div class="footer"><a href="#" id="options-link">Settings</a></div>
    <script src="lib/browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
